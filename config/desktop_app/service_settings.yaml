# =============================================================================
# DESKTOP APPLICATION - SERVICE SETTINGS
# =============================================================================
# Local service configuration for single-machine deployment - WINDOWS 11 PRIMARY
# =============================================================================

# FastAPI service
fastapi:
  host: "127.0.0.1"
  port: 8000
  reload: true  # Set to false in production
  workers: 1
  log_level: "info"
  access_log: true

# PostgreSQL service (Windows 11)
postgresql:
  host: "localhost"
  port: 5432
  socket: null  # Not used on Windows (sockets are Linux/Unix only)
  
  # Windows-specific PostgreSQL/PostGIS settings
  windows:
    service_name: "postgresql-x64-16"  # Default PostgreSQL 16 service name (adjust for version)
    data_directory: "C:/Program Files/PostgreSQL/16/data"
    config_file: "C:/Program Files/PostgreSQL/16/data/postgresql.conf"
    enable_spatial: true  # PostGIS extension for spatial support (enable via CREATE EXTENSION postgis)

# Service management
service_management:
  # Windows 11 (PRIMARY)
  windows:
    postgresql_service_name: "postgresql-x64-16"
    fastapi_service_name: "LandIntelligenceAPI"
    use_nssm: true  # Use NSSM (Non-Sucking Service Manager) for Windows services
    nssm_path: "C:/Program Files/NSSM/nssm.exe"  # Update if installed elsewhere
    
    # Task Scheduler for automated backups (alternative to service)
    use_task_scheduler: true
    task_name: "LandIntelligenceBackup"
    
  # Linux (REFERENCE ONLY)
  linux:
    postgresql_service_name: "postgresql"
    fastapi_service_name: "land-intelligence-api"
    use_systemd: true

# Startup behavior
startup:
  auto_start_services: true
  wait_for_database: true
  database_timeout_seconds: 30
  run_migrations_on_startup: false  # Set to true for development
  check_postgresql_service: true  # Verify PostgreSQL service is running

# Shutdown behavior
shutdown:
  graceful_timeout_seconds: 30
  backup_on_shutdown: false
  stop_postgresql_service: false  # Don't stop PostgreSQL when app shuts down

# Windows 11 specific settings
windows_settings:
  # PowerShell execution policy (may need to allow scripts)
  require_powershell_scripts: false
  
  # Windows Defender exclusions recommended for better performance
  recommend_defender_exclusions:
    - "C:/LandIntelligence"
    - "C:/Program Files/PostgreSQL"
  
  # Long path support (Windows 10 1607+)
  enable_long_paths: true
  
  # Windows firewall (not needed for localhost-only)
  configure_firewall: false